<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquatic App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Aquatic</h1>
        <p id="greeting">good morning bob</p>
    </header>

    <!-- Main Content Section (Scrollable, but hide scrollbar in CSS) -->
    <main>
        
        <!-- Tracker Container -->
        <div id="tracker-container">
            <div class="widget-circle">
                <svg class="progress-svg" viewBox="0 0 300 300">
                    <!-- Track Ring -->
                    <circle cx="150" cy="150" r="135" fill="none" stroke="#2c3e50" stroke-width="25" opacity="0.6"/>
                    <!-- Active Progress Ring (Targetable via JS) -->
                    <circle id="progress-circle" cx="150" cy="150" r="135" fill="none" stroke="#6384ff" stroke-width="25" stroke-dasharray="848.23" stroke-dashoffset="339.29" stroke-linecap="square"/>
                </svg>
                <div class="text-overlay">
                    <div id="percentage-text">60%</div>
                    <div id="volume-text">900ml</div>
                </div>
            </div>
            <p id="remaining-text">remaining 600ml</p>
        </div>

        <!-- Reports Container -->
        <div id="reports">
            
            <!-- Notifications sub-container -->
            <div id="notifications">
                <p>no reminders sent</p>
                <p>no notifications read</p>
            </div>

            <!-- Streak Container -->
            <div id="streak-paragraph">
                <p class="streak-title">winning streak</p>
                <div class="days-container">
                    <!-- White dots by default -->
                    <div class="day-item"><span>●</span>MON</div>
                    <div class="day-item"><span>●</span>TUE</div>
                    <div class="day-item"><span>●</span>WEN</div>
                    <div class="day-item"><span>●</span>TH</div>
                    <div class="day-item"><span>●</span>FRI</div>
                    <div class="day-item"><span>●</span>SAR</div>
                    <div class="day-item"><span>●</span>SUN</div>
                </div>
            </div>

            <!-- Framework Chart Placeholder Container -->
            <div id="chart-container">
                <!-- Framework graph will inject here later -->
                <button id="weekly-reports-btn">weekly reports</button>
            </div>

            <!-- More Info Container -->
            <div id="more-info">
                <p class="info-title">water frequently drank between</p>
                <p>7 to 8</p>
                <p>12 to 2pm</p>
            </div>

        </div>

    </main>

    <!-- Footer Action Buttons -->
    <footer>
        <button class="icon-btn">
            <img src="notification.svg" alt="Notification">
        </button>
        <button class="action-btn">drink water</button>
    </footer>

</body>
</html>
